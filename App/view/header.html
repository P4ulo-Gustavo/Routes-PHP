<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoElite — Componente Header</title>
    <link rel="stylesheet" href="/resources/css/variables.css" />
    <link rel="stylesheet" href="/resources/css/header.css" />
</head>

<body>

    <header class="site-header" id="siteHeader">
        <div class="header-inner">

            <!-- Logo -->
            <a href="/" class="logo" aria-label="AutoElite">
                <span class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <polygon points="14,2 26,9 26,23 14,26 2,23 2,9" stroke="#c9a84c" stroke-width="1.2"
                            fill="none" />
                        <text x="14" y="18" text-anchor="middle" font-size="10" fill="#c9a84c"
                            font-family="'Cormorant Garamond', serif" font-weight="600">AE</text>
                    </svg>
                </span>
                <span class="logo-text">Auto<strong>Elite</strong></span>
            </a>

            <!-- Nav -->
            <nav class="main-nav" id="mainNav" aria-label="Navegação principal">
                <ul class="nav-list">
                    <li><a href="#" class="nav-link active">Início</a></li>
                    <li class="nav-dropdown">
                        <a href="#" class="nav-link">Catálogo <span class="chevron">&#8964;</span></a>
                        <ul class="dropdown-menu">
                            <li><a href="#">Sedãs de Luxo</a></li>
                            <li><a href="#">SUVs Premium</a></li>
                            <li><a href="#">Esportivos</a></li>
                            <li><a href="#">Elétricos</a></li>
                            <li><a href="#">Importados</a></li>
                        </ul>
                    </li>
                    <li><a href="#" class="nav-link">Comparar</a></li>
                    <li><a href="#" class="nav-link">Financiamento</a></li>
                    <li><a href="#" class="nav-link">Contato</a></li>
                </ul>
            </nav>

            <!-- Actions -->
            <div class="header-actions">
                <button class="action-btn" id="searchToggle" aria-label="Buscar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </button>
                <button class="action-btn" aria-label="Favoritos">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z" />
                    </svg>
                    <span class="badge" id="favBadge">3</span>
                </button>
                <a href="/login" class="btn-login">Entrar</a>
            </div>

            <!-- Hamburger -->
            <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>

        </div>

        <!-- Search Bar -->
        <div class="search-bar" id="searchBar" aria-hidden="true">
            <div class="search-inner">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="search" id="searchInput" placeholder="Buscar modelo, marca, ano…" autocomplete="off" />
                <button class="search-close" id="searchClose" aria-label="Fechar busca">&times;</button>
            </div>
        </div>
    </header>

    <script src="/resources/js/header.js"></script>
</body>

</html>
